name: nazo-oauth

services:
  migrate:
    build:
      context: .
      dockerfile: Containerfile
    volumes:
      - ${NAZOAUTH_CONFIG:-./.env.yaml.example}:/app/.env.yaml:ro
    command: ["nazoauth", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      nazo_oauth_net:

  server:
    build:
      context: .
      dockerfile: Containerfile
    restart: unless-stopped
    environment:
      DATA_DIR: /var/lib/nazo_oauth
    volumes:
      - ${NAZOAUTH_CONFIG:-./.env.yaml.example}:/app/.env.yaml:ro
      - keys_data:/var/lib/nazo_oauth/keys
      - avatars_data:/var/lib/nazo_oauth/avatars
    ports:
      - "127.0.0.1:${NAZOAUTH_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    networks:
      nazo_oauth_net:
    command: ["nazoauth", "server"]

  postgres:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oauth}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      nazo_oauth_net:

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      nazo_oauth_net:

volumes:
  postgres_data:
  valkey_data:
  keys_data:
  avatars_data:

networks:
  nazo_oauth_net:
    driver: bridge
