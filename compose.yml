name: nazo-oauth

services:
  migrate:
    build:
      context: .
      dockerfile: Containerfile
    container_name: nazo-oauth-migrate
    volumes:
      - ./.env.yaml:/app/.env.yaml:ro
    command: ["nazoauth", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      nazo_oauth_net:

  nazo_oauth_server:
    build:
      context: .
      dockerfile: Containerfile
    container_name: nazo-oauth-server
    volumes:
      - ./.env.yaml:/app/.env.yaml:ro
      - ./runtime/keys:/var/lib/nazo_oauth/keys
      - ./runtime/avatars:/var/lib/nazo_oauth/avatars
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    networks:
      nazo_oauth_net:
        ipv4_address: 10.101.0.20
    command: ["nazoauth", "server"]

  postgres:
    image: docker.io/library/postgres:18
    container_name: nazo-oauth-postgres
    environment:
      POSTGRES_DB: oauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oauth"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      nazo_oauth_net:
        ipv4_address: 10.101.0.10

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    container_name: nazo-oauth-valkey
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      nazo_oauth_net:
        ipv4_address: 10.101.0.11

volumes:
  postgres_data:
  valkey_data:

networks:
  nazo_oauth_net:
    name: nazo_oauth_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.101.0.0/24
          gateway: 10.101.0.1
