name: ${COMPOSE_PROJECT_NAME:-nazoauth-keycloak-perf}

services:
  keycloak-postgres:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql
    networks:
      keycloak_net:

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_IMAGE_TAG:-26.6.4}
    command:
      - start-dev
      - --import-realm
      - --http-enabled=true
      - --hostname-strict=false
      - --health-enabled=true
      - --metrics-enabled=true
      - --db=postgres
      - --db-url=jdbc:postgresql://keycloak-postgres:5432/keycloak
      - --db-username=keycloak
      - --db-password=keycloak
      - --cache=local
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: warn
    ports:
      - "${KEYCLOAK_HOST_PORT:-18081}:8080"
    volumes:
      - ${KEYCLOAK_REALM_IMPORT:-./perf/keycloak/realm-perf.json}:/opt/keycloak/data/import/realm-perf.json:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      keycloak_net:

volumes:
  keycloak_postgres_data:

networks:
  keycloak_net:
    driver: bridge
