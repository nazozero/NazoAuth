[package]
name = "nazo-oauth-server"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
repository = "https://github.com/bymoye/NazoAuth"

[[bin]]
name = "nazo-oauth-server"
path = "src/main.rs"
test = false

[[bin]]
name = "nazo-oauth-migrate"
path = "src/bin/nazo_oauth_migrate.rs"
test = false

[[bin]]
name = "nazo-oauth-keyctl"
path = "src/bin/nazo_oauth_keyctl.rs"
test = false

[[bin]]
name = "nazo_oauth_seed_oidf"
path = "src/bin/nazo_oauth_seed_oidf.rs"
test = false

[dependencies]
actix-cors = "0.7.1"
actix-multipart = "0.7.2"
actix-web = { version = "4.13.0", features = ["cookies"] }
anyhow = "1.0.102"
argon2 = "0.5.3"
base64 = "0.22.1"
blake3 = "1.8.5"
chrono = { version = "0.4.44", features = ["serde"] }
diesel = { version = "2.3.9", features = ["postgres", "uuid", "chrono", "serde_json", "64-column-tables"] }
diesel-async = { version = "0.9.0", features = ["postgres", "deadpool"] }
diesel_migrations = "2.3.2"
ed25519-dalek = "2.2"
fred = { version = "10.1.0", features = ["i-scripts"] }
futures-util = "0.3.32"
hmac = "0.12.1"
jsonwebtoken = { version = "10.4.0", default-features = false, features = ["aws_lc_rs", "use_pem"] }
lettre = { version = "0.11.22", default-features = false, features = ["builder", "smtp-transport", "tokio1", "tokio1-native-tls"] }
openssl = "0.10.80"
opentelemetry = "0.32.0"
opentelemetry-appender-tracing = "0.32.0"
opentelemetry-otlp = { version = "0.32.0", default-features = false, features = ["http-proto", "logs", "metrics", "reqwest-blocking-client", "trace"] }
opentelemetry_sdk = { version = "0.32.1", features = ["logs", "metrics", "rt-tokio", "trace"] }
password-hash = { version = "0.5", features = ["rand_core"] }
passkey-auth = "0.1.3"
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8"] }
rand = "0.9.4"
rand_core = { version = "0.6.4", features = ["getrandom"] }
reqwest = { version = "0.13.4", default-features = false, features = ["native-tls", "json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-opentelemetry = "0.33.0"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
url = "2.5.8"
urlencoding = "2.1.3"
uuid = { version = "1.23.2", features = ["v7", "serde"] }
yaml_serde = "0.10.4"
tower = "0.5.3"
http = "1.4.1"
tonic = "0.14.6"

[dev-dependencies]
proptest = "1"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
