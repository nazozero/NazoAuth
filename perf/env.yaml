BIND: "0.0.0.0:8000"
PUBLIC_BASE_URL: "http://127.0.0.1:8000"
DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/oauth"
DATABASE_MAX_CONNECTIONS: 24
VALKEY_URL: "redis://valkey:6379/0"
DATA_DIR: "/var/lib/nazo_oauth"
CLIENT_SECRET_PEPPER: "perf-client-secret-pepper-000000000000000001"
PASSWORD_HASH_QUEUE_TIMEOUT_MS: 100
AUTHORIZATION_SERVER_PROFILE: "oauth2-baseline"
DPOP_NONCE_POLICY: "optional"
ENABLE_REQUEST_OBJECT: true
ENABLE_PAR_REQUEST_OBJECT: true
ENABLE_AUTHORIZATION_DETAILS: true
ENABLE_CIBA: true
CIBA_SECURITY_PROFILE: "fapi2-ciba"
CIBA_AUTH_REQ_ID_TTL_SECONDS: 600
CIBA_POLL_INTERVAL_SECONDS: 1
CIBA_AUTOMATED_DECISION_TOKEN: "perf-ciba-automated-decision-token-2026"
COOKIE_SECURE: false
TRUSTED_PROXY_CIDRS: "172.16.0.0/12"
RATE_LIMIT_WINDOW_SECONDS: 60
AUTH_RATE_LIMIT_MAX_REQUESTS: 1000000
TOKEN_RATE_LIMIT_MAX_REQUESTS: 1000000
TOKEN_MANAGEMENT_RATE_LIMIT_MAX_REQUESTS: 1000000
LOGIN_FAILURE_WINDOW_SECONDS: 900
LOGIN_FAILURE_EMAIL_MAX_ATTEMPTS: 50
LOGIN_FAILURE_IP_EMAIL_MAX_ATTEMPTS: 5
SESSION_TTL_SECONDS: 28800
AUTH_CODE_TTL_SECONDS: 60
PAR_TTL_SECONDS: 90
ACCESS_TOKEN_TTL_SECONDS: 300
ID_TOKEN_TTL_SECONDS: 600
REFRESH_TOKEN_TTL_SECONDS: 2592000
RUST_LOG: "warn"
