coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 90%
        threshold: 2%

ignore:
  # Generated Diesel table declarations. Protocol and persistence behavior is
  # tested through repository/handler code, not by executing generated macros.
  - "src/schema.rs"
  # Diesel row projection structs and connection-pool glue. These files carry
  # no protocol, authorization, token, or persistence state-transition policy;
  # behavior is covered through repository, handler, and conformance tests.
  - "src/domain/rows.rs"
  - "src/db.rs"
  # Route table wiring only. Handler behavior remains covered in the owning
  # HTTP modules and integration tests.
  - "src/bootstrap/routes.rs"
  # Thin Valkey command wrappers. Business keys, replay semantics, and token
  # state transitions are tested in the calling protocol modules.
  - "src/support/valkey.rs"
  # Module aggregation re-exports only. No protocol, authorization, or token
  # policy; all covered in the owning sub-modules.
  - "src/lib.rs"
  - "src/domain/mod.rs"
  - "src/domain/state.rs"
  - "src/domain/keyset.rs"
  - "src/http/mod.rs"
  - "src/http/admin.rs"
  - "src/http/admin/clients/mod.rs"
  - "src/http/auth/mod.rs"
  - "src/http/authorization/mod.rs"
  - "src/http/profile.rs"
  - "src/http/token.rs"
  - "src/support/mod.rs"
  # Thin binary/bootstrap wrappers with no protocol or security decisions.
  - "src/main.rs"
  - "src/bin/nazo_oauth_keyctl.rs"
  - "src/bin/nazo_oauth_migrate.rs"
  # Local OIDF seed tool. Deterministic parsing/JWKS logic lives in src/oidf_seed
  # and remains covered; database seeding side effects are exercised by OIDF runs.
  - "src/bin/nazo_oauth_seed_oidf.rs"
  # Test implementation files are excluded so coverage measures production code.
  - "tests/**"
  - "benches/**"
  - "examples/**"
  - "migrations/**"
