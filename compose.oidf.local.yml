services:
  oidf_https:
    image: docker.io/library/nginx:1.27-alpine
    container_name: nazo-oauth-oidf-https
    depends_on:
      - nazo_oauth_server
    volumes:
      - ./runtime/oidf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./runtime/oidf/certs:/etc/nginx/certs:ro
      - ./runtime/oidf/ui:/usr/share/nginx/html/ui:ro
    networks:
      nazo_oauth_net:
    ports:
      - "9443:9443"
