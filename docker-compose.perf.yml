name: ${COMPOSE_PROJECT_NAME:-nazoauth-perf}

services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
    environment:
      POSTGRES_DB: oauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oauth"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - perf_postgres_data:/var/lib/postgresql
    networks:
      perf_net:

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      perf_net:

  keyset:
    build:
      context: .
      dockerfile: perf/keyset/Containerfile
    volumes:
      - perf_runtime:/var/lib/nazo_oauth
    command:
      - sh
      - -c
      - python /scripts/ensure_runtime_keyset.py --key-dir /var/lib/nazo_oauth/keys --active-alg RS256 --required-alg PS256 && touch /tmp/keyset-ready && tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/keyset-ready"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      perf_net:

  nazoauth:
    build:
      context: .
      dockerfile: Containerfile
      target: perf-runtime
    environment:
      PERF_METRICS_ENABLED: "true"
    volumes:
      - perf_runtime:/var/lib/nazo_oauth
    command: ["nazoauth", "server"]
    depends_on:
      migrate:
        condition: service_healthy
    networks:
      perf_net:

  migrate:
    build:
      context: .
      dockerfile: Containerfile
      target: perf-runtime
    volumes:
      - perf_runtime:/var/lib/nazo_oauth
    command: ["sh", "-c", "nazoauth migrate && touch /tmp/migrate-ready && tail -f /dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrate-ready"]
      interval: 2s
      timeout: 2s
      retries: 30
    depends_on:
      keyset:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      perf_net:

  perf:
    build:
      context: .
      dockerfile: perf/runner/Containerfile
    environment:
      COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME:-nazoauth-perf}"
      BASE_URL: "http://nazoauth:8000"
      ISSUER_URL: "http://127.0.0.1:8000"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/oauth"
      VALKEY_URL: "redis://valkey:6379/0"
      PERF_PROFILE: "${PERF_PROFILE:-all}"
      PERF_SCENARIO: "${PERF_SCENARIO:-}"
      PERF_EXECUTOR: "${PERF_EXECUTOR:-}"
      PERF_RATE: "${PERF_RATE:-}"
      PERF_TIME_UNIT: "${PERF_TIME_UNIT:-1s}"
      PERF_PRE_ALLOCATED_VUS: "${PERF_PRE_ALLOCATED_VUS:-}"
      PERF_MAX_VUS: "${PERF_MAX_VUS:-}"
      PERF_DURATION: "${PERF_DURATION:-20s}"
      PERF_VUS: "${PERF_VUS:-8}"
      PERF_FLOW_VUS: "${PERF_FLOW_VUS:-}"
      PERF_ITERATIONS: "${PERF_ITERATIONS:-50}"
      PERF_VECTOR_COUNT: "${PERF_VECTOR_COUNT:-1000}"
      PERF_USER_COUNT: "${PERF_USER_COUNT:-64}"
      PERF_APP_REPLICAS: "${PERF_APP_REPLICAS:-1}"
      PERF_RESULTS_DIR: "/results"
      PERF_REPORT_PATH: "${PERF_REPORT_PATH:-/docs/performance/performance-benchmarks.md}"
      CLIENT_SECRET_PEPPER: "perf-client-secret-pepper-000000000000000001"
    volumes:
      - perf_results:/results
      - perf_state:/perf-state
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      nazoauth:
        condition: service_started
    networks:
      perf_net:

volumes:
  perf_postgres_data:
  perf_runtime:
  perf_results:
  perf_state:

networks:
  perf_net:
    driver: bridge
