name: release-security

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libpq-dev
      - name: Install pinned Rust supply-chain tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: |
            cargo-audit@0.22.2
            cargo-deny@0.20.2
            cargo-cyclonedx@0.5.9
      - name: Audit Rust advisories
        run: cargo audit
      - name: Check dependency policy
        run: cargo deny check advisories bans licenses sources
      - name: Generate Rust SBOM
        run: |
          cargo cyclonedx --manifest-path crates/authorization-server/Cargo.toml --format json --override-filename nazoauth.cdx
          mkdir -p target
          mv crates/authorization-server/nazoauth.cdx.json target/nazoauth.cdx.json
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Build release image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: Containerfile
          target: runtime
          tags: nazo-oauth-server:${{ github.sha }}
          load: true
          cache-from: type=gha,scope=nazo-oauth-service
          cache-to: type=gha,mode=max,scope=nazo-oauth-service
      - name: Export release binary and image
        run: |
          mkdir -p target/release
          container_id="$(docker create nazo-oauth-server:${{ github.sha }})"
          docker cp "$container_id:/usr/local/bin/nazoauth" target/release/nazoauth
          docker rm "$container_id"
          docker save nazo-oauth-server:${{ github.sha }} -o target/nazo-oauth-server-image.tar
      - name: Scan release images
        run: |
          for archive in target/nazo-oauth-server-image.tar; do
            docker run --rm \
              -v "$PWD/$archive:/image.tar:ro" \
              docker.io/aquasec/trivy:0.72.0@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f image \
                --format table \
                --exit-code 1 \
                --severity CRITICAL,HIGH \
                --ignore-unfixed \
                --input /image.tar
          done
      - name: Transfer unsigned release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nazo-oauth-release-unsigned
          path: |
            target/release/nazoauth
            target/nazoauth.cdx.json
            target/nazo-oauth-server-image.tar
          if-no-files-found: error
          retention-days: 1

  sign-and-attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download unsigned release artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: nazo-oauth-release-unsigned
          path: target
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release artifacts
        run: |
          cosign sign-blob --yes --bundle target/release/nazoauth.bundle target/release/nazoauth
          cosign sign-blob --yes --bundle target/nazoauth.cdx.json.bundle target/nazoauth.cdx.json
          cosign sign-blob --yes --bundle target/nazo-oauth-server-image.tar.bundle target/nazo-oauth-server-image.tar
      - name: Attest release binaries and SBOM
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            target/release/nazoauth
            target/nazoauth.cdx.json
      - name: Attest release image archive
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            target/nazo-oauth-server-image.tar
      - name: Upload signed release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nazo-oauth-release-artifacts
          path: |
            target/release/nazoauth
            target/nazoauth.cdx.json
            target/nazo-oauth-server-image.tar
            target/release/*.bundle
            target/*.bundle
          if-no-files-found: error
