name: conformance-security

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/conformance-security.yml"
      - ".github/e2e-runner.Containerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "deny.toml"
      - ".cargo/**"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**/*.rs"
      - "examples/**/Cargo.toml"
      - "examples/**/Cargo.lock"
      - "migrations/**"
      - "scripts/**"
      - "deploy/**"
      - "Containerfile"
      - "Dockerfile"
      - ".dockerignore"
      - "compose*.yml"
      - ".env.yaml.example"
  pull_request:
    paths:
      - ".github/workflows/conformance-security.yml"
      - ".github/e2e-runner.Containerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "deny.toml"
      - ".cargo/**"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**/*.rs"
      - "examples/**/Cargo.toml"
      - "examples/**/Cargo.lock"
      - "migrations/**"
      - "scripts/**"
      - "deploy/**"
      - "Containerfile"
      - "Dockerfile"
      - ".dockerignore"
      - "compose*.yml"
      - ".env.yaml.example"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: oauth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oauth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/oauth
      VALKEY_URL: redis://127.0.0.1:6379/0
      VALKEY_COMMAND_TIMEOUT_MS: "1000"
      BIND: 127.0.0.1:18000
      ISSUER: http://127.0.0.1:18000
      MTLS_ENDPOINT_BASE_URL: http://127.0.0.1:18000
      FRONTEND_BASE_URL: http://127.0.0.1:3000
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000
      COOKIE_SECURE: "false"
      SESSION_COOKIE_NAME: nazo_oauth_session
      CSRF_COOKIE_NAME: nazo_oauth_csrf
      EMAIL_DELIVERY: disabled
      EMAIL_CODE_DEV_RESPONSE_ENABLED: "false"
      AVATAR_STORAGE_DIR: runtime/ci/avatars
      JWK_KEYS_DIR: runtime/ci/keys
      AUTH_RATE_LIMIT_MAX_REQUESTS: "100000"
      TOKEN_RATE_LIMIT_MAX_REQUESTS: "100000"
      TOKEN_MANAGEMENT_RATE_LIMIT_MAX_REQUESTS: "100000"
      REQUIRE_PUSHED_AUTHORIZATION_REQUESTS: "false"
      SCIM_BEARER_TOKEN: ci-scim-secret
      FEDERATION_OIDC_PROVIDER_ID: ci-oidc
      FEDERATION_OIDC_ISSUER: https://issuer.example
      FEDERATION_OIDC_AUTHORIZATION_ENDPOINT: https://issuer.example/authorize
      FEDERATION_OIDC_TOKEN_ENDPOINT: https://issuer.example/token
      FEDERATION_OIDC_JWKS_URL: https://issuer.example/jwks
      FEDERATION_OIDC_CLIENT_ID: ci-oidc-client
      FEDERATION_OIDC_CLIENT_SECRET: ci-oidc-secret
      FEDERATION_OIDC_REDIRECT_URI: http://127.0.0.1:18000/auth/federation/oidc/callback
      FEDERATION_OIDC_SCOPES: openid email profile
      FEDERATION_SAML_GATEWAY_ENABLED: "true"
      FEDERATION_SAML_GATEWAY_ISSUER: ci-saml-gateway
      FEDERATION_SAML_GATEWAY_AUDIENCE: nazo-oauth-ci
      FEDERATION_SAML_GATEWAY_SECRET: ci-saml-gateway-secret-000000000000
      RUST_TEST_THREADS: "1"
      CARGO_TERM_COLOR: never
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libpq-dev
      - name: Prepare runtime directories
        run: mkdir -p runtime/ci/avatars runtime/ci/keys
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Run migrations
        run: cargo run --locked --bin nazo-oauth-migrate
      - name: Test
        run: cargo test --locked --workspace --all-features --lib

  supply-chain-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libpq-dev
      - name: Install Rust supply-chain tools
        run: |
          set -euo pipefail
          install_crate() {
            local crate="$1"
            for attempt in 1 2 3; do
              if cargo install "$crate" --locked; then
                return 0
              fi
              sleep $((attempt * 20))
            done
            cargo install "$crate" --locked
          }
          install_crate cargo-audit
          install_crate cargo-deny
          install_crate cargo-cyclonedx
      - name: Audit Rust advisories
        run: cargo audit
      - name: Check dependency policy
        run: cargo deny check advisories bans licenses sources
      - name: Generate Rust SBOM
        run: |
          cargo cyclonedx --format json --override-filename nazo-oauth-server.cdx
          mkdir -p target
          mv nazo-oauth-server.cdx.json target/nazo-oauth-server.cdx.json
      - uses: docker/setup-buildx-action@v3.11.1
      - name: Build service image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: Containerfile
          tags: nazo-oauth-supply-chain:${{ github.sha }}
          load: true
          cache-from: type=gha,scope=nazo-oauth-service
          cache-to: type=gha,mode=max,scope=nazo-oauth-service
      - name: Scan service image
        run: |
          docker save nazo-oauth-supply-chain:${{ github.sha }} -o /tmp/nazo-oauth-supply-chain.tar
          docker run --rm \
            -v /tmp/nazo-oauth-supply-chain.tar:/image.tar:ro \
            docker.io/aquasec/trivy@sha256:a22415a38938a56c379387a8163fcb0ce38b10ace73e593475d3658d578b2436 image \
              --format table \
              --exit-code 1 \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --input /image.tar
      - name: Upload SBOM
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nazo-oauth-rust-sbom
          path: target/nazo-oauth-server.cdx.json
          if-no-files-found: error

  real-http-security-matrix:
    runs-on: ubuntu-latest
    needs:
      - rust-gate
      - supply-chain-gate
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: docker/setup-buildx-action@v3.11.1
      - name: Build service image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: Containerfile
          tags: nazo-oauth-e2e:latest
          load: true
          cache-from: type=gha,scope=nazo-oauth-service
          cache-to: type=gha,mode=max,scope=nazo-oauth-service
      - name: Build E2E runner image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          tags: nazo-oauth-e2e-runner:latest
          load: true
          cache-from: type=gha,scope=nazo-oauth-e2e-runner
          cache-to: type=gha,mode=max,scope=nazo-oauth-e2e-runner
          file: .github/e2e-runner.Containerfile
      - name: Prepare isolated runtime config
        run: |
          mkdir -p runtime/e2e/keys runtime/e2e/avatars
          cat > runtime/e2e/.env.yaml <<'YAML'
          BIND: "0.0.0.0:8000"
          DATABASE_URL: "postgresql://postgres:postgres@nazo-oauth-e2e-postgres:5432/oauth"
          VALKEY_URL: "redis://nazo-oauth-e2e-valkey:6379/0"
          VALKEY_COMMAND_TIMEOUT_MS: 1000
          ISSUER: "http://127.0.0.1:8000"
          FRONTEND_BASE_URL: "http://127.0.0.1:3000"
          CORS_ALLOWED_ORIGINS:
            - "http://127.0.0.1:3000"
          DEFAULT_AUDIENCE: "resource://default"
          SESSION_COOKIE_NAME: "nazo_oauth_session"
          CSRF_COOKIE_NAME: "nazo_oauth_csrf"
          COOKIE_SECURE: false
          SESSION_TTL_SECONDS: 28800
          AUTH_CODE_TTL_SECONDS: 60
          ACCESS_TOKEN_TTL_SECONDS: 300
          ID_TOKEN_TTL_SECONDS: 600
          REFRESH_TOKEN_TTL_SECONDS: 2592000
          AVATAR_MAX_BYTES: 2097152
          CLIENT_DELIVERY_TTL_SECONDS: 86400
          RATE_LIMIT_WINDOW_SECONDS: 60
          AUTH_RATE_LIMIT_MAX_REQUESTS: 100000
          TOKEN_RATE_LIMIT_MAX_REQUESTS: 100000
          TOKEN_MANAGEMENT_RATE_LIMIT_MAX_REQUESTS: 100000
          TRUSTED_PROXY_CIDRS: ""
          CLIENT_IP_HEADER_MODE: "none"
          SUBJECT_TYPE: "public"
          PAIRWISE_SUBJECT_SECRET: ""
          PAR_TTL_SECONDS: 90
          REQUIRE_PUSHED_AUTHORIZATION_REQUESTS: false
          ENABLE_REQUEST_OBJECT: true
          ENABLE_REQUEST_URI_PARAMETER: true
          ENABLE_PAR_REQUEST_OBJECT: true
          ENABLE_AUTHORIZATION_DETAILS: true
          ENABLE_LEGACY_AUDIENCE_PARAM: true
          SCIM_BEARER_TOKEN: "codecov-scim-secret"
          FEDERATION_OIDC_PROVIDER_ID: "codecov-oidc"
          FEDERATION_OIDC_ISSUER: "https://issuer.example"
          FEDERATION_OIDC_AUTHORIZATION_ENDPOINT: "https://issuer.example/authorize"
          FEDERATION_OIDC_TOKEN_ENDPOINT: "https://issuer.example/token"
          FEDERATION_OIDC_JWKS_URL: "https://issuer.example/jwks"
          FEDERATION_OIDC_CLIENT_ID: "codecov-oidc-client"
          FEDERATION_OIDC_CLIENT_SECRET: "codecov-oidc-secret"
          FEDERATION_OIDC_REDIRECT_URI: "http://127.0.0.1:8000/auth/federation/oidc/callback"
          FEDERATION_OIDC_SCOPES: "openid email profile"
          FEDERATION_SAML_GATEWAY_ENABLED: true
          FEDERATION_SAML_GATEWAY_ISSUER: "codecov-saml-gateway"
          FEDERATION_SAML_GATEWAY_AUDIENCE: "nazo-oauth-codecov"
          FEDERATION_SAML_GATEWAY_SECRET: "codecov-saml-gateway-secret-000000"
          EMAIL_DELIVERY: "smtp"
          EMAIL_CODE_TTL_SECONDS: 900
          EMAIL_CODE_SEND_COOLDOWN_SECONDS: 1
          EMAIL_CODE_PEER_COOLDOWN_SECONDS: 1
          EMAIL_SMTP_HOST: "nazo-oauth-e2e-runner"
          EMAIL_SMTP_PORT: 1025
          EMAIL_SMTP_TLS: "none"
          EMAIL_SMTP_USERNAME: ""
          EMAIL_SMTP_PASSWORD: ""
          EMAIL_FROM: "Nazo OAuth <no-reply@example.com>"
          EMAIL_CODE_DEV_RESPONSE_ENABLED: false
          AVATAR_STORAGE_DIR: "/var/lib/nazo_oauth/avatars"
          JWK_KEYS_DIR: "/var/lib/nazo_oauth/keys"
          RUST_LOG: "info"
          YAML
      - name: Start PostgreSQL and Valkey
        run: |
          docker network create nazo-oauth-e2e-net
          docker run -d --name nazo-oauth-e2e-postgres --network nazo-oauth-e2e-net -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=oauth postgres:18-alpine
          docker run -d --name nazo-oauth-e2e-valkey --network nazo-oauth-e2e-net valkey/valkey:8-alpine
          ready=false
          for i in $(seq 1 60); do
            if docker run --rm --network nazo-oauth-e2e-net -e PGPASSWORD=postgres postgres:18-alpine \
              sh -lc 'pg_isready -h nazo-oauth-e2e-postgres -U postgres -d oauth && psql -h nazo-oauth-e2e-postgres -U postgres -d oauth -c "select 1" >/dev/null'
            then
              ready=true
              break
            fi
            sleep 2
          done
          [ "$ready" = "true" ]
      - name: Migrate and start server
        run: |
          docker run --rm --name nazo-oauth-e2e-migrate --network nazo-oauth-e2e-net \
            -v "$PWD/runtime/e2e/.env.yaml:/app/.env.yaml:ro" \
            -v "$PWD/runtime/e2e/keys:/var/lib/nazo_oauth/keys" \
            -v "$PWD/runtime/e2e/avatars:/var/lib/nazo_oauth/avatars" \
            nazo-oauth-e2e:latest nazo-oauth-migrate
          docker run -d --name nazo-oauth-e2e-server --network nazo-oauth-e2e-net \
            -v "$PWD/runtime/e2e/.env.yaml:/app/.env.yaml:ro" \
            -v "$PWD/runtime/e2e/keys:/var/lib/nazo_oauth/keys" \
            -v "$PWD/runtime/e2e/avatars:/var/lib/nazo_oauth/avatars" \
            nazo-oauth-e2e:latest nazo-oauth-server
      - name: Run full real HTTP E2E
        run: |
          docker run --rm --name nazo-oauth-e2e-runner --network nazo-oauth-e2e-net \
            -v "$PWD:/app" -w /app \
            -e E2E_BASE_URL=http://nazo-oauth-e2e-server:8000 \
            -e E2E_ISSUER_URL=http://127.0.0.1:8000 \
            nazo-oauth-e2e-runner:latest python scripts/full_real_request_e2e.py
      - name: Run load and race gate
        run: |
          docker run --rm --name nazo-oauth-e2e-runner --network nazo-oauth-e2e-net \
            -v "$PWD:/app" -w /app \
            -e E2E_BASE_URL=http://nazo-oauth-e2e-server:8000 \
            -e LOAD_REQUESTS=400 \
            -e LOAD_CONCURRENCY=32 \
            nazo-oauth-e2e-runner:latest python scripts/full_real_request_load.py
      - name: Run Valkey outage injection
        run: |
          docker stop nazo-oauth-e2e-valkey
          docker run --rm --name nazo-oauth-e2e-runner --network nazo-oauth-e2e-net \
            -v "$PWD:/app" -w /app \
            -e E2E_BASE_URL=http://nazo-oauth-e2e-server:8000 \
            nazo-oauth-e2e-runner:latest python scripts/valkey_failure_injection.py
      - name: Cleanup
        if: always()
        run: |
          docker rm -f nazo-oauth-e2e-runner nazo-oauth-e2e-server nazo-oauth-e2e-postgres nazo-oauth-e2e-valkey 2>/dev/null || true
          docker network rm nazo-oauth-e2e-net 2>/dev/null || true
