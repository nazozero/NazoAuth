name: dependency-review

on:
  pull_request:
    paths:
      - ".github/workflows/dependency-review.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - "crates/**/Cargo.toml"
      - "deny.toml"
      - "Containerfile"
      - ".github/e2e-runner.Containerfile"
      - ".github/e2e-requirements.in"
      - ".github/e2e-requirements.txt"
      - ".github/workflows/*.yml"
      - ".github/dependabot.yml"
      - "renovate.json"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency vulnerability review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: false

  rust-advisory-audit:
    name: Rust advisory audit
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@1.97.0

      - name: Install pinned cargo-audit
        uses: taiki-e/install-action@v2.83.2
        with:
          tool: cargo-audit@0.22.2

      - name: Audit Rust advisories
        run: cargo audit
