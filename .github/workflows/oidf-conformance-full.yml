name: oidf-conformance-full

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oidf-conformance-full:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CONFORMANCE_SERVER: ${{ vars.OIDF_CONFORMANCE_SERVER || 'https://www.certification.openid.net/' }}
      OIDF_REF: ${{ vars.OIDF_CONFORMANCE_SUITE_REF || '33a724c7d809a6f9db05cbb513ff2a77cbac905e' }}
      EXPORT_RESULTS: ${{ vars.OIDF_EXPORT_RESULTS || 'false' }}
      VERBOSE: ${{ vars.OIDF_VERBOSE || 'true' }}
      DISABLE_SSL_VERIFY: ${{ vars.OIDF_DISABLE_SSL_VERIFY || 'false' }}
      OIDF_TARGET_ISSUER: ${{ vars.OIDF_TARGET_ISSUER || 'https://auth.nazo.run' }}
      RUN_TIMEOUT_SECONDS: ${{ vars.OIDF_RUN_TIMEOUT_SECONDS || '14400' }}
      MONITOR_INTERVAL_SECONDS: ${{ vars.OIDF_MONITOR_INTERVAL_SECONDS || '60' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Clone official conformance suite
        run: |
          set -euo pipefail
          git init oidf-conformance-suite
          git -C oidf-conformance-suite remote add origin https://gitlab.com/openid/conformance-suite.git
          git -C oidf-conformance-suite fetch --depth 1 origin "$OIDF_REF"
          git -C oidf-conformance-suite checkout --detach FETCH_HEAD
          diff -u requirements/oidf-conformance.in oidf-conformance-suite/scripts/requirements.txt

      - name: Install official runner dependencies
        run: python -m pip install --require-hashes -r requirements/oidf-conformance.txt

      - name: Install age decryptor
        run: cargo install rage --version 0.11.2 --locked

      - name: Write full OIDF matrix plan set
        run: |
          set -euo pipefail
          cat > oidf-full-plan-set.json <<'JSON'
          [
            "oidcc-basic-certification-test-plan[server_metadata=discovery][client_registration=static_client] oidf-oidcc-basic-plan-config.json",
            "oidcc-config-certification-test-plan oidf-oidcc-config-plan-config.json",
            "fapi2-message-signing-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=plain_fapi][fapi_request_method=signed_non_repudiation][fapi_response_mode=jarm][sender_constrain=dpop][openid=openid_connect] oidf-fapi-matrix-message-final-private-key-jwt-dpop-openid-connect-plain-fapi-jarm-plan-config.json",
            "fapi2-message-signing-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=plain_fapi][fapi_request_method=signed_non_repudiation][fapi_response_mode=plain_response][sender_constrain=dpop][openid=openid_connect] oidf-fapi-matrix-message-final-private-key-jwt-dpop-openid-connect-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=mtls][fapi_profile=plain_fapi][sender_constrain=dpop][openid=openid_connect] oidf-fapi-matrix-security-final-mtls-dpop-openid-connect-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=mtls][fapi_profile=fapi_client_credentials_grant][sender_constrain=dpop][openid=plain_oauth] oidf-fapi-matrix-security-final-mtls-dpop-plain-oauth-fapi-client-credentials-grant-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=mtls][fapi_profile=plain_fapi][sender_constrain=dpop][openid=plain_oauth] oidf-fapi-matrix-security-final-mtls-dpop-plain-oauth-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=mtls][fapi_profile=plain_fapi][sender_constrain=mtls][openid=openid_connect] oidf-fapi-matrix-security-final-mtls-mtls-openid-connect-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=mtls][fapi_profile=fapi_client_credentials_grant][sender_constrain=mtls][openid=plain_oauth] oidf-fapi-matrix-security-final-mtls-mtls-plain-oauth-fapi-client-credentials-grant-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=mtls][fapi_profile=plain_fapi][sender_constrain=mtls][openid=plain_oauth] oidf-fapi-matrix-security-final-mtls-mtls-plain-oauth-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=plain_fapi][sender_constrain=dpop][openid=openid_connect] oidf-fapi-matrix-security-final-private-key-jwt-dpop-openid-connect-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=fapi_client_credentials_grant][sender_constrain=dpop][openid=plain_oauth] oidf-fapi-matrix-security-final-private-key-jwt-dpop-plain-oauth-fapi-client-credentials-grant-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=plain_fapi][sender_constrain=dpop][openid=plain_oauth] oidf-fapi-matrix-security-final-private-key-jwt-dpop-plain-oauth-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=plain_fapi][sender_constrain=mtls][openid=openid_connect] oidf-fapi-matrix-security-final-private-key-jwt-mtls-openid-connect-plain-fapi-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=fapi_client_credentials_grant][sender_constrain=mtls][openid=plain_oauth] oidf-fapi-matrix-security-final-private-key-jwt-mtls-plain-oauth-fapi-client-credentials-grant-plain-response-plan-config.json",
            "fapi2-security-profile-final-test-plan[client_auth_type=private_key_jwt][fapi_profile=plain_fapi][sender_constrain=mtls][openid=plain_oauth] oidf-fapi-matrix-security-final-private-key-jwt-mtls-plain-oauth-plain-fapi-plain-response-plan-config.json"
          ]
          JSON

      - name: Write full OIDF matrix config
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "$OIDF_PLAN_CONFIG_AGE_IDENTITY" > oidf-plan-config.agekey
          rage --decrypt \
            --identity oidf-plan-config.agekey \
            --output oidf-plan-config-secret-patch.json \
            docs/conformance/oidf-plan-config-secret-patch.json.age
          python scripts/materialize_oidf_plan_config.py \
            --template docs/conformance/oidf-plan-config-template.json \
            --secret-patch-file oidf-plan-config-secret-patch.json \
            --output oidf-plan-configs.json
        env:
          OIDF_PLAN_CONFIG_AGE_IDENTITY: ${{ secrets.OIDF_PLAN_CONFIG_AGE_IDENTITY }}

      - name: Run full OIDF matrix
        run: |
          set -euo pipefail
          args=(
            --suite-dir oidf-conformance-suite
            --conformance-server "$CONFORMANCE_SERVER"
            --config-json-file oidf-plan-configs.json
            --plan-set-json-file oidf-full-plan-set.json
            --target-issuer "$OIDF_TARGET_ISSUER"
            --timeout-seconds "$RUN_TIMEOUT_SECONDS"
            --monitor-interval-seconds "$MONITOR_INTERVAL_SECONDS"
          )
          if [ "$EXPORT_RESULTS" = "true" ]; then
            args+=(--export-dir "$GITHUB_WORKSPACE/oidf-results")
          fi
          if [ "$VERBOSE" = "true" ]; then
            args+=(--verbose)
          fi
          if [ "$DISABLE_SSL_VERIFY" = "true" ]; then
            args+=(--disable-ssl-verify)
          fi
          python -u scripts/run_oidf_conformance.py "${args[@]}"
        env:
          OIDF_CONFORMANCE_TOKEN: ${{ secrets.OIDF_CONFORMANCE_TOKEN }}
          OIDF_USER_EMAIL: ${{ secrets.OIDF_USER_EMAIL }}
          OIDF_USER_PASSWORD: ${{ secrets.OIDF_USER_PASSWORD }}

      - name: Upload OIDF result archive
        if: always() && vars.OIDF_EXPORT_RESULTS != 'false'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: oidf-conformance-results-full
          path: oidf-results
          if-no-files-found: ignore
