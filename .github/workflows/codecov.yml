name: codecov

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codecov.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - "requirements/codecov.txt"
      - "src/**"
      - "scripts/generate_codecov_lcov.sh"
      - "scripts/full_real_request_e2e.py"
      - "tests/**"
      - "benches/**"
      - "examples/**/*.rs"
      - "examples/**/Cargo.toml"
      - "examples/**/Cargo.lock"
      - "migrations/**"
  pull_request:
    paths:
      - ".github/workflows/codecov.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - "requirements/codecov.txt"
      - "src/**"
      - "scripts/generate_codecov_lcov.sh"
      - "scripts/full_real_request_e2e.py"
      - "tests/**"
      - "benches/**"
      - "examples/**/*.rs"
      - "examples/**/Cargo.toml"
      - "examples/**/Cargo.lock"
      - "migrations/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    name: Rust coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libpq-dev

      - name: Install Python E2E dependencies
        run: python -m pip install --require-hashes -r requirements/codecov.txt

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        shell: bash
        env:
          CARGO_BUILD_JOBS: 1
          CARGO_TERM_COLOR: never
          CARGO_TARGET_DIR: target/codecov-coverage
        run: bash scripts/generate_codecov_lcov.sh

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

      - name: Note skipped Codecov upload
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "Codecov upload skipped because CODECOV_TOKEN is unavailable for this event."
