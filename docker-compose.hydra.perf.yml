name: ${COMPOSE_PROJECT_NAME:-nazoauth-hydra-perf}

services:
  hydra-postgres:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_DB: hydra
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hydra_postgres_data:/var/lib/postgresql
    networks:
      hydra_net:

  hydra-migrate:
    image: docker.io/oryd/hydra:${HYDRA_IMAGE_TAG:-v26.2.0}
    command: ["migrate", "sql", "up", "-e", "--yes"]
    environment:
      DSN: postgres://hydra:hydra@hydra-postgres:5432/hydra?sslmode=disable
    depends_on:
      hydra-postgres:
        condition: service_healthy
    networks:
      hydra_net:

  hydra:
    image: docker.io/oryd/hydra:${HYDRA_IMAGE_TAG:-v26.2.0}
    command: ["serve", "all", "--dev"]
    environment:
      DSN: postgres://hydra:hydra@hydra-postgres:5432/hydra?sslmode=disable
      SECRETS_SYSTEM: benchmark-system-secret-with-at-least-32-bytes
      URLS_SELF_ISSUER: http://hydra:4444/
      URLS_LOGIN: http://127.0.0.1:5555/login
      URLS_CONSENT: http://127.0.0.1:5555/consent
      URLS_LOGOUT: http://127.0.0.1:5555/logout
      OAUTH2_ACCESS_TOKEN_STRATEGY: jwt
      LOG_LEVEL: warn
    ports:
      - "${HYDRA_PUBLIC_HOST_PORT:-18082}:4444"
      - "${HYDRA_ADMIN_HOST_PORT:-18083}:4445"
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    networks:
      hydra_net:

volumes:
  hydra_postgres_data:

networks:
  hydra_net:
    driver: bridge
